<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Challenge - Find Your Score</title>
    <style>
        /* ── Color Tokens ─────────────────────────────────────────── */
        :root {
            --bg-primary:   #F7F5F2;
            --bg-card:      #FFFFFF;
            --bg-alt:       #EFEAE4;
            --text-primary: #2E2E2E;
            --text-sec:     #6B6B6B;
            --text-dim:     #A0A0A0;
            --cta:          #FF7A00;
            --cta-hover:    #E66A00;
            --cta-text:     #FFFFFF;
            --accent-soft:  #FFD9B3;
            --highlight:    #FFC107;
            --border:       #E4DDD5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            margin-bottom: 24px;
            margin-top: 20px;
        }

        /* Row 1: lang toggle right-aligned */
        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        /* Row 2: title + subtitle centered */
        .header-body {
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.05em;
            color: var(--text-sec);
        }

        /* ── Language Toggle ─────────────────────────────────────── */
        .lang-toggle {
            display: flex;
            background: var(--bg-alt);
            border-radius: 30px;
            padding: 4px;
            gap: 4px;
            border: 1px solid var(--border);
        }

        .lang-btn {
            padding: 7px 18px;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.88em;
            transition: all 0.25s;
            background: transparent;
            color: var(--text-sec);
        }

        .lang-btn.active {
            background: var(--cta);
            color: var(--cta-text);
            box-shadow: 0 2px 8px rgba(255,122,0,0.3);
        }

        .lang-btn:not(.active):hover {
            background: var(--accent-soft);
            color: var(--cta);
        }

        /* ── Progress Bar ────────────────────────────────────────── */
        .progress-bar {
            height: 6px;
            background: var(--bg-alt);
            border-radius: 10px;
            margin: 0 0 28px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--cta);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        /* ── Card ────────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 4px 24px rgba(46,46,46,0.08);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        /* ── Quiz Sections ───────────────────────────────────────── */
        .question-section { display: none; }
        .question-section.active { display: block; animation: slideIn 0.3s ease; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            font-size: 0.8em;
            font-weight: 700;
            color: var(--cta);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .question-title {
            font-size: 1.35em;
            color: var(--text-primary);
            margin-bottom: 24px;
            font-weight: 700;
            line-height: 1.45;
        }

        .options { display: flex; flex-direction: column; gap: 11px; }

        .option {
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--bg-card);
            font-size: 0.97em;
            font-weight: 500;
            color: var(--text-primary);
            text-align: left;
        }

        .option:hover {
            border-color: var(--cta);
            background: #FFF5ED;
        }

        .option.selected {
            border-color: var(--cta);
            background: var(--cta);
            color: var(--cta-text);
        }

        /* ── Lead Form ───────────────────────────────────────────── */
        .lead-form { display: none; }
        .lead-form.active { display: block; animation: slideIn 0.3s ease; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95em;
        }

        .phone-input-group { display: flex; gap: 10px; }

        .country-select {
            width: 120px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .country-select:focus { outline: none; border-color: var(--cta); }

        input[type="text"],
        input[type="tel"] {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.25s;
            width: 100%;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        input[type="text"]::placeholder,
        input[type="tel"]::placeholder { color: var(--text-dim); }

        input[type="text"]:focus,
        input[type="tel"]:focus { outline: none; border-color: var(--cta); box-shadow: 0 0 0 3px rgba(255,122,0,0.12); }

        .error { color: #D94F3D; font-size: 0.84em; margin-top: 5px; }

        /* ── Buttons ─────────────────────────────────────────────── */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 20px;
        }

        .btn-primary {
            background: var(--cta);
            color: var(--cta-text);
        }

        .btn-primary:hover {
            background: var(--cta-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,122,0,0.35);
        }

        /* ── Score / Result ──────────────────────────────────────── */
        .result-section { display: none; text-align: center; }
        .result-section.active { display: block; animation: slideIn 0.3s ease; }

        /* ── Score Tier Badge ────────────────────────────────────── */
        .score-tier-section {
            display: none;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .score-tier-section.active {
            display: block;
        }

        .tier-badge {
            display: inline-block;
            padding: 20px 40px;
            border-radius: 16px;
            margin: 20px 0;
            font-size: 1.1em;
            font-weight: 700;
        }

        .tier-beginner {
            background: #FFE8D6;
            color: #D35400;
        }

        .tier-average {
            background: #FFF9E6;
            color: #F39C12;
        }

        .tier-fit {
            background: #D4EDDA;
            color: #27AE60;
        }

        .tier-emoji {
            font-size: 2.5em;
            margin-right: 10px;
        }

        /* ── Error Popup ────────────────────────────────────────── */
        .error-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            max-width: 90%;
        }

        .error-popup.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .error-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .error-popup-overlay.show {
            display: block;
        }

        .error-popup h3 {
            color: #D94F3D;
            margin-bottom: 15px;
        }

        .error-popup p {
            color: var(--text-sec);
            margin-bottom: 20px;
        }

        .error-popup-btn {
            background: var(--cta);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .error-popup-btn:hover {
            background: var(--cta-hover);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: 800;
            color: var(--cta-text);
            background: var(--cta);
            box-shadow: 0 12px 32px rgba(255,122,0,0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .score-label { font-size: 1.3em; color: var(--text-primary); margin-bottom: 10px; font-weight: 700; }
        .score-sub   { color: var(--text-sec); font-size: 1em; margin-bottom: 20px; }

        /* ── Step indicator ──────────────────────────────────────── */
        .step-indicator {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.88em;
            margin-top: 20px;
        }

        /* ── Nav Buttons ─────────────────────────────────────────── */
        .nav-buttons { display: flex; gap: 10px; margin-top: 28px; }

        .btn-back {
            flex: 1;
            background: var(--bg-card);
            color: var(--cta);
            border: 2px solid var(--cta);
            margin-top: 0;
        }

        .btn-back:hover { background: #FFF5ED; }
        .btn-next { flex: 2; margin-top: 0; }

        /* ── Success ─────────────────────────────────────────────── */
        .success-message { display: none; text-align: center; }
        .success-message.active { display: block; animation: slideIn 0.3s ease; }

        /* ── Hindi font ──────────────────────────────────────────── */
        .lang-hi .question-title,
        .lang-hi .option,
        .lang-hi label,
        .lang-hi .btn,
        .lang-hi .score-label,
        .lang-hi .score-sub,
        .lang-hi .step-indicator,
        .lang-hi .subtitle {
            font-family: 'Noto Sans Devanagari', 'Mangal', sans-serif;
        }
    </style>

</head>
<body>
    <div class="container">
        <header>
            <!-- Row 1: Language toggle (right-aligned, never overlaps title) -->
            <div class="header-top">
                <div class="lang-toggle">
                    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
                    <button class="lang-btn" id="btnHi" onclick="setLang('hi')">हिंदी</button>
                </div>
            </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="card">
            <!-- Error Popup -->

            <div class="error-popup" id="errorPopup">
                <h3 id="errorTitle">⚠️ Invalid Input</h3>
                <p id="errorMessage"></p>
                <button class="error-popup-btn" onclick="closeErrorPopup()">OK</button>
            </div>

            <!-- Score Tier Display (shown after quiz, before form) -->
            <div class="score-tier-section" id="scoreTierSection">

                <div class="score-circle" id="scoreTierCircle">—</div>
                <div class="tier-badge" id="tierBadge">
                    <span class="tier-emoji" id="tierEmoji">💪</span>
                    <span id="tierText">Fit</span>
                </div>
                <p id="tierMessage" style="color: var(--text-sec); font-size: 0.95em; margin: 20px 0;"></p>
                <button class="btn btn-primary" id="continueToFormBtn" onclick="showLeadForm()"></button>
            </div>

            <!-- Lead Form -->
            <div class="lead-form" id="leadForm">
                <div style="margin-bottom: 20px;">
                    <p id="formStepLabel" style="color: var(--text-sec); font-size: 0.95em; text-align: center;"></p>
                </div>
                <div class="form-group">
                    <label id="labelName">Full Name *</label>
                    <input type="text" id="fullName" placeholder="Your name" required>
                    <div class="error" id="nameError"></div>
                </div>
                <div class="form-group">
                    <label id="labelPhone">Phone Number *</label>
                    <div class="phone-input-group">
                        <select id="countryCode" class="country-select"></select>
                        <input type="tel" id="phone" placeholder="9876543210" required>
                    </div>
                    <div class="error" id="phoneError"></div>
                </div>
                <button class="btn btn-primary" id="startQuizBtn"></button>
            </div>

            <!-- Quiz -->
            <div id="quizContainer" style="display: none;">
                <div class="question-section" data-question="0">
                    <div class="question-number" id="qnum-0"></div>
                    <div class="question-title" id="qtitle-0"></div>
                    <div class="options" id="qopts-0"></div>
                </div>
                <div class="question-section" data-question="1">
                    <div class="question-number" id="qnum-1"></div>
                    <div class="question-title" id="qtitle-1"></div>
                    <div class="options" id="qopts-1"></div>
                </div>
                <div class="question-section" data-question="2">
                    <div class="question-number" id="qnum-2"></div>
                    <div class="question-title" id="qtitle-2"></div>
                    <div class="options" id="qopts-2"></div>
                </div>
                <div class="question-section" data-question="3">
                    <div class="question-number" id="qnum-3"></div>
                    <div class="question-title" id="qtitle-3"></div>
                    <div class="options" id="qopts-3"></div>
                </div>
                <div class="question-section" data-question="4">
                    <div class="question-number" id="qnum-4"></div>
                    <div class="question-title" id="qtitle-4"></div>
                    <div class="options" id="qopts-4"></div>
                </div>
            </div>

            <!-- Results -->
            <div class="result-section" id="resultSection">
                <div class="score-circle" id="scoreCircle">—</div>
                <div class="score-label" id="scoreLabel"></div>
                <div class="score-sub" id="scoreSub"></div>
            </div>

            <!-- Nav Buttons (shown during quiz only) -->
            <div class="nav-buttons" id="navButtons" style="display: none;">
                <button class="btn btn-back" id="backBtn" style="display:none;"></button>
                <button class="btn btn-primary btn-next" id="nextBtn"></button>
            </div>

            <!-- Success -->
            <div class="success-message" id="successMessage">
                <div style="font-size: 3em; margin-bottom: 15px;">✅</div>
                <h2 id="successTitle" style="color:#333; margin-bottom: 8px;"></h2>
                <p id="successSub" style="color:#999;"></p>
            </div>

            <div class="step-indicator" id="stepIndicator"></div>
        </div>

        // ─── COUNTRY CODES ───────────────────────────────────────────────
        const countryCodes = [
            { code: '+91', flag: '🇮🇳', name: 'India' },
            { code: '+1',  flag: '🇺🇸', name: 'US / Canada' },
            { code: '+44', flag: '🇬🇧', name: 'UK' },
            { code: '+61', flag: '🇦🇺', name: 'Australia' },
            { code: '+86', flag: '🇨🇳', name: 'China' },
            { code: '+81', flag: '🇯🇵', name: 'Japan' },
            { code: '+82', flag: '🇰🇷', name: 'S. Korea' },
            { code: '+60', flag: '🇲🇾', name: 'Malaysia' },
            { code: '+65', flag: '🇸🇬', name: 'Singapore' },
            { code: '+62', flag: '🇮🇩', name: 'Indonesia' },
            { code: '+55', flag: '🇧🇷', name: 'Brazil' },
            { code: '+27', flag: '🇿🇦', name: 'S. Africa' },
            { code: '+966', flag: '🇸🇦', name: 'Saudi Arabia' },
            { code: '+971', flag: '🇦🇪', name: 'UAE' },
            { code: '+33', flag: '🇫🇷', name: 'France' },
            { code: '+49', flag: '🇩🇪', name: 'Germany' },
            { code: '+39', flag: '🇮🇹', name: 'Italy' },
            { code: '+34', flag: '🇪🇸', name: 'Spain' },
            { code: '+31', flag: '🇳🇱', name: 'Netherlands' },
        ];

        function initCountryCodes() {
            const select = document.getElementById('countryCode');
            countryCodes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.code;
                opt.textContent = `${c.flag} ${c.code}`;
                if (c.code === '+91') opt.selected = true;
                select.appendChild(opt);
            });
            select.addEventListener('change', e => selectedCountry = e.target.value);
        }

        async function detectCountry() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const cc = data.country_calling_code;
                const select = document.getElementById('countryCode');
                select.value = cc;
                selectedCountry = cc;
            } catch { /* default +91 */ }
        }

        // ─── UTILITY FUNCTIONS ──────────────────────────────────────────
        function showErrorPopup(message) {
            const T = t[lang];
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorPopup').classList.add('show');
            document.getElementById('errorOverlay').classList.add('show');
        }

        function closeErrorPopup() {
            document.getElementById('errorPopup').classList.remove('show');
            document.getElementById('errorOverlay').classList.remove('show');
        }

        function generateRefId(name) {
            const firstName = name.split(' ')[0].toLowerCase().replace(/[^a-z]/g, '');
            const timestamp = Date.now().toString(36).slice(-4);
            return firstName + '_' + timestamp;
        }

        function validatePhone(phone, dialCode) {
            const digitsOnly = phone.replace(/\D/g, '');
            if (dialCode === '+91') {
                return digitsOnly.length === 10;
            }
            return digitsOnly.length >= 6 && digitsOnly.length <= 15;
        }

        function sanitizePhone(phone, dialCode) {
            return dialCode + phone.replace(/\D/g, '');
        }

        function checkDuplicatePhone(phone, dialCode) {
            const sanitized = sanitizePhone(phone, dialCode);
            const leads = JSON.parse(localStorage.getItem('leads')) || [];
            return leads.some(l => l.phone === sanitized);
        }

        function getScoreTier(score) {
            if (score <= 30) return { tier: 'beginner', emoji: '😬', color: 'tier-beginner' };
            if (score <= 60) return { tier: 'average', emoji: '🙂', color: 'tier-average' };
            return { tier: 'fit', emoji: '💪', color: 'tier-fit' };
        }

        function getTierMessage(tier, lang) {
            const T = t[lang];
            const key = 'tier' + tier.charAt(0).toUpperCase() + tier.slice(1) + 'Msg';
            return T[key] || '';
        }

        function saveSessionQuiz() {
            sessionStorage.setItem('quizSession', JSON.stringify({
                currentQuestion,
                answers,
                selectedCountry
            }));
        }

        function loadSessionQuiz() {
            const session = sessionStorage.getItem('quizSession');
            if (session) {
                const data = JSON.parse(session);
                currentQuestion = data.currentQuestion;
                answers = data.answers;
                selectedCountry = data.selectedCountry;
                return true;
            }
            return false;
        }

        function clearSessionQuiz() {
            sessionStorage.removeItem('quizSession');
        }

        // ─── LANGUAGE ────────────────────────────────────────────────────
        function setLang(newLang) {
            lang = newLang;
            localStorage.setItem('quizLang', lang);

            // Toggle button styles
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
            document.getElementById('btnHi').classList.toggle('active', lang === 'hi');

            // Toggle Hindi font class on card
            document.querySelector('.card').classList.toggle('lang-hi', lang === 'hi');

            applyTranslations();
        }

        function applyTranslations() {
            const T = t[lang];

            document.getElementById('headerTitle').textContent = T.headerTitle;
            document.getElementById('headerSubtitle').textContent = T.headerSubtitle;

            // Render all questions
            T.questions.forEach((q, i) => {
                document.getElementById(`qnum-${i}`).textContent =
                    `${T.questionLabel} ${i + 1} ${T.of} 5`;
                document.getElementById(`qtitle-${i}`).textContent = q.title;

                const optsContainer = document.getElementById(`qopts-${i}`);
                // Preserve selected state while re-rendering
                const selectedVal = optsContainer.querySelector('.option.selected')?.dataset.value;
                optsContainer.innerHTML = q.options.map((opt, j) => `
                    <button class="option${selectedVal == j+1 ? ' selected' : ''}" data-value="${j + 1}">
                        ${opt}
                    </button>
                `).join('');
            });

            // Nav buttons
            updateButtons();

            // Form labels
            document.getElementById('formStepLabel').textContent = T.formStep;
            document.getElementById('labelName').textContent   = T.labelName;
            document.getElementById('labelPhone').textContent  = T.labelPhone;
            document.getElementById('fullName').placeholder    = T.namePlaceholder;
            document.getElementById('startQuizBtn').textContent = T.startQuiz;

            // Result section (if visible)
            if (quizScore) {
                document.getElementById('scoreLabel').textContent = T.scoreFit.replace('%s', quizScore);
                document.getElementById('scoreSub').textContent   = T.scoreUnlock;
            }

            // Step indicator
            const leadFormActive = document.getElementById('leadForm').classList.contains('active');
            if (!leadFormActive) {
                document.getElementById('stepIndicator').textContent =
                    `${T.questionLabel} ${currentQuestion + 1} ${T.of} 5`;
            }

            // Success message
            document.getElementById('successTitle').textContent = T.successTitle;
            document.getElementById('successSub').textContent   = T.successSub;
        }

        // ─── QUIZ LOGIC ──────────────────────────────────────────────────
        function updateProgress() {
            document.getElementById('progressFill').style.width = `${(currentQuestion / 5) * 100}%`;
        }

        function showQuestion(index) {
            document.querySelectorAll('.question-section').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-question="${index}"]`).classList.add('active');
            const T = t[lang];
            document.getElementById('stepIndicator').textContent =
                `${T.questionLabel} ${index + 1} ${T.of} 5`;
            updateProgress();
            updateButtons();
        }

        function updateButtons() {
            const T = t[lang];
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');

            backBtn.textContent = T.back;
            backBtn.style.display = currentQuestion === 0 ? 'none' : 'block';
            nextBtn.textContent   = currentQuestion === 4 ? T.seeResults : T.next;
        }

        document.addEventListener('click', e => {
            if (e.target.classList.contains('option')) {
                const section = e.target.closest('.question-section');
                section.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                e.target.classList.add('selected');
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            const selected = document.querySelector(`[data-question="${currentQuestion}"] .option.selected`);
            if (!selected) {
                alert(lang === 'hi' ? 'कृपया एक विकल्प चुनें' : 'Please select an option');
                return;
            }
            answers[currentQuestion] = parseInt(selected.dataset.value);

            if (currentQuestion < 4) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                showResults();
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        });

        function calculateScore() {
            const total = answers.reduce((s, v) => s + v, 0);
            return Math.round((total / 15) * 100);
        }

        function showResults() {
            const T = t[lang];
            quizScore = calculateScore();
            const tierInfo = getScoreTier(quizScore);

            // Show score tier section
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('stepIndicator').style.display = 'none';
            document.getElementById('resultSection').classList.remove('active');

            // Update tier display
            document.getElementById('scoreTierCircle').textContent = quizScore + '%';
            document.getElementById('tierBadge').className = 'tier-badge ' + tierInfo.color;
            document.getElementById('tierEmoji').textContent = tierInfo.emoji;
            document.getElementById('tierText').textContent = T['tier' + tierInfo.tier.charAt(0).toUpperCase() + tierInfo.tier.slice(1)];
            document.getElementById('tierMessage').textContent = getTierMessage(tierInfo.tier, lang);
            document.getElementById('continueToFormBtn').textContent = T.continueToForm;

            document.getElementById('scoreTierSection').classList.add('active');

            // Save to session for restoration if needed
            saveSessionQuiz();
        }

        // ─── SHOW LEAD FORM (after quiz) ────────────────────────────────
        function showLeadForm() {
            document.getElementById('scoreTierSection').classList.remove('active');
            document.getElementById('leadForm').classList.add('active');
            applyTranslations();
        }

        // ─── START QUIZ (Lead Form Submit) ──────────────────────────────
        document.getElementById('startQuizBtn').addEventListener('click', () => {
            const T = t[lang];
            const name  = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            let valid = true;

            // Clear previous errors
            document.getElementById('nameError').textContent = '';
            document.getElementById('phoneError').textContent = '';

            if (!name) {
                document.getElementById('nameError').textContent = T.nameError;
                valid = false;
            }

            if (!phone) {
                document.getElementById('phoneError').textContent = T.phoneError;
                valid = false;
            } else if (!validatePhone(phone, selectedCountry)) {
                if (selectedCountry === '+91') {
                    document.getElementById('phoneError').textContent = T.phoneIndiaValidation;
                } else {
                    document.getElementById('phoneError').textContent = T.phoneValidation;
                }
                valid = false;
            } else if (checkDuplicatePhone(phone, selectedCountry)) {
                document.getElementById('phoneError').textContent = T.duplicatePhone;
                valid = false;
            }

            if (!valid) return;

            // Store user data
            tempUser.name = name;
            tempUser.phone = sanitizePhone(phone, selectedCountry);

            // Generate referral ID
            currentRefId = generateRefId(name);

            // Create and save lead
            const lead = {
                id: currentRefId,
                name: tempUser.name.split(' ')[0],
                phone: tempUser.phone,
                score: quizScore,
                lang,
                referredBy,
                timestamp: new Date().toISOString(),
                referrals: []
            };

            // Update referrer's referral list
            if (referredBy) {
                const leads = JSON.parse(localStorage.getItem('leads')) || [];
                leads.forEach(l => {
                    if (l.id === referredBy) {
                        if (!l.referrals) l.referrals = [];
                        l.referrals.push(currentRefId);
                    }
                });
                localStorage.setItem('leads', JSON.stringify(leads));
            } else {
                const leads = JSON.parse(localStorage.getItem('leads')) || [];
                leads.push(lead);
                localStorage.setItem('leads', JSON.stringify(leads));
            }

            // Add new lead if referrer exists
            if (referredBy) {
                const leads = JSON.parse(localStorage.getItem('leads')) || [];
                leads.push(lead);
                localStorage.setItem('leads', JSON.stringify(leads));
            }

            clearSessionQuiz();
            setTimeout(() => {
                window.location.href = `referral.html?id=${currentRefId}`;
            }, 500);
        });

        // ─── INIT ────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            // Detect referral parameter
            const params = new URLSearchParams(window.location.search);
            referredBy = params.get('ref') || null;

            // Load session if available (quiz in progress)
            if (loadSessionQuiz()) {
                // Quiz was in progress, restore it
                currentQuestion = 0;
                document.getElementById('leadForm').classList.remove('active');
                document.getElementById('quizContainer').style.display = 'block';
                document.getElementById('navButtons').style.display = 'flex';
                document.getElementById('stepIndicator').style.display = 'block';
                showQuestion(0);
            } else {
                // Fresh start - show form
                document.getElementById('leadForm').classList.add('active');
                document.getElementById('scoreTierSection').classList.remove('active');
            }

            initCountryCodes();
            detectCountry();
            applyTranslations();

            // Apply saved language
            document.getElementById(lang === 'hi' ? 'btnHi' : 'btnEn').classList.add('active');
            document.getElementById(lang === 'hi' ? 'btnEn' : 'btnHi').classList.remove('active');
            if (lang === 'hi') document.querySelector('.card').classList.add('lang-hi');

            // Handle overlay click to close error popup
            document.getElementById('errorOverlay').addEventListener('click', closeErrorPopup);
        });
    </script>
</body>
</html>
