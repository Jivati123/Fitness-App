<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Personalized Fitness Plan</title>
    <style>
        :root {
            --bg-primary:   #F7F5F2;
            --bg-card:      #FFFFFF;
            --text-primary: #2E2E2E;
            --text-sec:     #6B6B6B;
            --cta:          #FF7A00;
            --cta-hover:    #E66A00;
            --cta-text:     #FFFFFF;
            --border:       #E4DDD5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.05em;
            color: var(--text-sec);
            margin-bottom: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 4px 24px rgba(46,46,46,0.08);
            margin-bottom: 30px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .score-display {
            font-size: 3.5em;
            font-weight: 800;
            color: var(--cta);
            margin-bottom: 20px;
        }

        .score-message {
            font-size: 1.2em;
            color: var(--text-primary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .referral-section {
            background: #FFF5ED;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #FFD9B3;
        }

        .referral-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .referral-link {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            color: var(--cta);
            margin-bottom: 12px;
            font-size: 0.9em;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--cta);
            color: var(--cta-text);
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background: var(--cta-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,122,0,0.35);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--cta);
            border: 2px solid var(--cta);
            width: 100%;
        }

        .btn-secondary:hover {
            background: #FFF5ED;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--text-sec);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--cta);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎉 Results</h1>
            <p class="subtitle">Your personalized fitness plan is ready!</p>
        </header>

        <div class="card">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading your fitness plan...</p>
            </div>

            <div id="content" style="display: none;">
                <div class="score-display" id="scoreDisplay">—</div>
                <div class="score-message" id="scoreMessage">
                    <p id="greeting"></p>
                </div>

                <div class="referral-section">
                    <div class="referral-title">📢 Share & Earn</div>
                    <p style="color: var(--text-sec); margin-bottom: 12px;">Invite friends to take the quiz and earn rewards!</p>
                    <div class="referral-link" id="referralLink"></div>
                    <button class="btn btn-secondary" onclick="copyLink()">Copy Link</button>
                </div>

                <div id="stats" style="margin-bottom: 24px;"></div>

                <button class="btn btn-primary" onclick="retakQuiz()">Retake Quiz</button>
                <button class="btn btn-secondary" onclick="shareResults()">Share Results</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('id');

        window.addEventListener('load', () => {
            if (refId) {
                // Simulate loading delay for better UX
                setTimeout(displayResults, 1500);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('scoreMessage').innerHTML =
                    '<p>Take the quiz first to get your personalized fitness plan!</p>' +
                    '<button class="btn btn-primary" onclick="window.location.href=\'/index.html\'">Take Quiz</button>';
            }
        });

        function displayResults() {
            const leads = JSON.parse(localStorage.getItem('leads') || '[]');
            const lead = leads.find(l => l.id === refId);

            if (!lead) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('scoreMessage').innerHTML =
                    '<p>Unable to load your results. Please take the quiz again.</p>';
                return;
            }

            // Display score
            document.getElementById('scoreDisplay').textContent = lead.score + '%';

            // Personalized message based on score
            let message = '';
            if (lead.score >= 80) {
                message = `Excellent work, ${lead.name}! You're a fitness champion! 🏆`;
            } else if (lead.score >= 60) {
                message = `Great effort, ${lead.name}! You're on the right track! 💪`;
            } else if (lead.score >= 40) {
                message = `Good start, ${lead.name}! Keep improving! 🚀`;
            } else {
                message = `Time to level up, ${lead.name}! You've got this! 💪`;
            }

            document.getElementById('greeting').textContent = message;

            // Referral link
            const baseUrl = window.location.origin;
            const refLink = `${baseUrl}/index.html?ref=${refId}`;
            document.getElementById('referralLink').textContent = refLink;

            // Stats
            const referrals = lead.referrals || [];
            const statsHtml = `
                <div style="padding: 16px; background: #F0F0F0; border-radius: 8px;">
                    <p style="color: var(--text-sec); font-size: 0.9em; margin-bottom: 8px;">Your Referrals</p>
                    <div style="font-size: 1.8em; font-weight: 700; color: var(--cta);">${referrals.length}</div>
                    <p style="color: var(--text-sec); font-size: 0.85em;">friends invited</p>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;

            // Show content, hide loading
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function copyLink() {
            const link = document.getElementById('referralLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copied to clipboard!');
            }).catch(() => {
                alert('Unable to copy. Please copy manually: ' + link);
            });
        }

        function shareResults() {
            const text = `I just completed the Fitness Challenge Quiz! Check my score and take it yourself: ${window.location.href}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Fitness Challenge',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert(text);
            }
        }

        function retakQuiz() {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
